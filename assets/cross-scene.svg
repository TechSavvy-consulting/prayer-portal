<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title">
  <title>Glowing cross over mountains and water</title>
  <defs>
    <radialGradient id="light" cx="50%" cy="36%" r="45%">
      <stop offset="0" stop-color="#fff4ca"/>
      <stop offset=".14" stop-color="#ffd98d" stop-opacity=".85"/>
      <stop offset=".42" stop-color="#266f95" stop-opacity=".38"/>
      <stop offset="1" stop-color="#06131f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset=".48" stop-color="#0b2335"/>
      <stop offset="1" stop-color="#04080e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12364d"/>
      <stop offset="1" stop-color="#040910"/>
    </linearGradient>
    <filter id="soft-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="620" fill="url(#sky)"/>
  <rect width="920" height="620" fill="url(#light)"/>
  <g opacity=".8">
    <circle cx="110" cy="76" r="1.8" fill="#ffd99b"/>
    <circle cx="240" cy="115" r="1.2" fill="#d9f7ff"/>
    <circle cx="712" cy="83" r="1.4" fill="#ffd99b"/>
    <circle cx="826" cy="151" r="1.1" fill="#d9f7ff"/>
    <circle cx="584" cy="70" r="1" fill="#d9f7ff"/>
    <circle cx="368" cy="64" r="1.3" fill="#ffd99b"/>
  </g>
  <path d="M0 370l128-145 92 64 76-88 121 142 86-112 101 125 80-83 236 138v209H0z" fill="#091522"/>
  <path d="M0 404l109-90 105 56 78-64 103 85 84-73 101 82 101-58 239 119v159H0z" fill="#0d2435"/>
  <rect y="398" width="920" height="222" fill="url(#water)"/>
  <g opacity=".55" stroke="#56dfff" stroke-linecap="round">
    <path d="M206 450h508" stroke-width="2"/>
    <path d="M250 486h420" stroke-width="1.5"/>
    <path d="M312 525h296" stroke-width="1.4"/>
    <path d="M362 560h198" stroke-width="1"/>
  </g>
